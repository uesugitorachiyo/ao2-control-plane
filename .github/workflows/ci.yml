          path: target/release-train-bridge-smoke/${{ matrix.name }}
          if-no-files-found: error

  operator-release-evidence-bridge-smoke:
    name: AO2 release evidence bridge smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: macos-aarch64
            os: macos-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
            server_bin: target/release/ao2-cp-server.exe
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Run Unix AO2 release evidence bridge smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          python3 scripts/smoke-operator-release-evidence-bridge.py \
            --summary crates/ao2-cp-server/tests/fixtures/operator-release-evidence-bundle-summary.json \
            --server-bin "${{ matrix.server_bin }}" \
            --out-root "target/operator-release-evidence-bridge-smoke/${{ matrix.name }}"
      - name: Run Windows AO2 release evidence bridge smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          python scripts/smoke-operator-release-evidence-bridge.py `
            --summary crates/ao2-cp-server/tests/fixtures/operator-release-evidence-bundle-summary.json `
            --server-bin "${{ matrix.server_bin }}" `
            --out-root "target/operator-release-evidence-bridge-smoke/${{ matrix.name }}"
      - name: Upload AO2 release evidence bridge smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-operator-release-evidence-bridge-smoke-${{ matrix.name }}
          path: target/operator-release-evidence-bridge-smoke/${{ matrix.name }}
          if-no-files-found: error

  operator-release-evidence-hosted-bridge-smoke:
    name: AO2 release evidence hosted bridge smoke
    runs-on: ubuntu-latest
    needs: operator-release-evidence-bridge-smoke
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Run hosted AO2 release evidence bridge smoke
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/smoke-operator-release-evidence-bridge.py \
            --download-latest-ao2-artifact \
            --server-bin target/release/ao2-cp-server \
            --out-root target/operator-release-evidence-hosted-bridge-smoke
      - name: Validate hosted bridge smoke summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/operator-release-evidence-hosted-bridge-smoke/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-operator-release-evidence-bridge-smoke.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["downloaded_latest_ao2_artifact"] is True, summary
          operator = summary["operator_release_evidence"]
          assert operator["schema_version"] == "ao2.operator-release-evidence-bundle.v1", summary
          assert operator["status"] == "passed", summary
          assert operator["operator_release_evidence_ready"] is True, summary
          assert operator["path_redacted"] is True, summary
          trust = summary["trust_boundary"]
          assert trust["downloads_github_actions_artifacts"] is True, summary
          assert trust["control_plane_approves_release"] is False, summary
          assert trust["mutates_ao_artifacts"] is False, summary
          assert trust["mutates_observer_storage"] is False, summary
          assert trust["credential_material_included"] is False, summary
          assert trust["provider_api_keys_allowed"] is False, summary
          failed = [check for check in summary["checks"] if check["status"] != "passed"]
          assert not failed, failed
          PY
      - name: Upload hosted AO2 release evidence bridge smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-operator-release-evidence-hosted-bridge-smoke
          path: target/operator-release-evidence-hosted-bridge-smoke
          if-no-files-found: error

  ingest-smoke:
    name: Ingest smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            shell: bash
          - name: macos-aarch64
            os: macos-latest
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Unix ingest smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: scripts/smoke-ingest-from-ao2.sh
      - name: Run Windows ingest smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: ./scripts/smoke-ingest-from-ao2.ps1

  smoke:
    name: Release archive smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: ingest-smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            target_label: linux-x86_64
            binary: target/release/ao2-cp-server
            archive: dist/ao2-control-plane-0.1.14-linux-x86_64.tar.gz
            shell: bash
          - name: macos-aarch64
            os: macos-latest
            target_label: macos-aarch64
            binary: target/release/ao2-cp-server
            archive: dist/ao2-control-plane-0.1.14-macos-aarch64.tar.gz
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            target_label: windows-x86_64
            binary: target/release/ao2-cp-server.exe
            archive: dist/ao2-control-plane-0.1.14-windows-x86_64.tar.gz
            shell: pwsh
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Package archive
        shell: bash
        run: |
          scripts/package-local.sh \
            --out-dir dist \
            --version 0.1.14 \
            --binary "${{ matrix.binary }}" \
            --target-label "${{ matrix.target_label }}"
      - name: Check release archive license files
        shell: bash
        run: scripts/check-license-policy.sh --scan-archives
      - name: Run Unix archive smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          AO2_CP_ARCHIVE="${{ matrix.archive }}" \
            AO2_CP_SMOKE_JSON="target/release-smoke/${{ matrix.target_label }}.json" \
            scripts/smoke-release-archive.sh
      - name: Run Windows archive smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $env:AO2_CP_ARCHIVE = "${{ matrix.archive }}"
          $env:AO2_CP_SMOKE_JSON = "target/release-smoke/${{ matrix.target_label }}.json"
          ./scripts/smoke-release-archive.ps1
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-smoke-${{ matrix.target_label }}
          path: target/release-smoke/${{ matrix.target_label }}.json
      - name: Upload release archive artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-archive-${{ matrix.target_label }}
          path: |
            ${{ matrix.archive }}
            dist/SHA256SUMS
            target/release-smoke/${{ matrix.target_label }}.json
          if-no-files-found: error
