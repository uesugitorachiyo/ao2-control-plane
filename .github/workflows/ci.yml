name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  license-policy:
    name: License policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Check license policy
        run: scripts/check-license-policy.sh
      - name: Check public repo policy
        run: scripts/check-public-repo-policy.sh

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: Cargo deny (bans + licenses + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      # Checks dependency bans (duplicate versions), license allow-list, and
      # source allow-list against the checked-in deny.toml. Advisory scanning
      # remains in the dedicated `audit` job (cargo-audit).
      - name: Deny check
        run: cargo deny check bans licenses sources

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # RUSTSEC-2023-0071 (rsa 0.9.x Marvin Attack) ignored: we use rsa only
      # for signature *verification* (public-key modexp via the `Verifier`
      # trait). The Marvin Attack targets RSA *decryption* timing
      # sidechannels; verify-only paths are not exposed. See
      # docs/security/advisory-dispositions.md for the full disposition.
      - name: Audit dependencies
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  python-guards:
    name: Python guard tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install pytest
        run: python3 -m pip install pytest
      - name: Run Python guard tests
        shell: bash
        run: |
          mkdir -p target/ci-artifacts/python-guards
          set +e
          PYTHONDONTWRITEBYTECODE=1 python3 -m pytest tests/test_ao2_rsi_live_self_change_rehearsal_readback.py tests/test_ao2_rsi_control_surface_readback.py tests/test_ao_stack_rsi_chain_binding_readback.py tests/test_start_long_lived_dev.py tests/test_release_asset_parity_audit.py tests/test_release_promotion_workflow.py tests/test_release_notes_from_checksums.py tests/test_public_release_pair_verify.py tests/test_ao2_stable_promotion_evidence_index_readback.py tests/test_ao2_dual_repo_public_approval_closure_readback.py tests/test_active_stack_release_handoff_readback.py tests/test_ao2_rsi_claim_readiness_readback.py tests/test_ao2_rsi_self_change_dry_run_readback.py tests/test_ao2_rsi_authority_packet_readback.py -q \
            2>&1 | tee target/ci-artifacts/python-guards/pytest.log
          status="${PIPESTATUS[0]}"
          set -e
          python3 - "$status" <<'PY'
          import json
          import sys
          from pathlib import Path

          status = int(sys.argv[1])
          out = Path("target/ci-artifacts/python-guards")
          payload = {
              "schema_version": "ao2.cp-python-guard-ci-artifacts.v1",
              "status": "passed" if status == 0 else "failed",
              "command": "PYTHONDONTWRITEBYTECODE=1 python3 -m pytest tests/test_ao2_rsi_live_self_change_rehearsal_readback.py tests/test_ao2_rsi_control_surface_readback.py tests/test_ao_stack_rsi_chain_binding_readback.py tests/test_start_long_lived_dev.py tests/test_release_asset_parity_audit.py tests/test_release_promotion_workflow.py tests/test_release_notes_from_checksums.py tests/test_public_release_pair_verify.py tests/test_ao2_stable_promotion_evidence_index_readback.py tests/test_ao2_dual_repo_public_approval_closure_readback.py tests/test_active_stack_release_handoff_readback.py tests/test_ao2_rsi_claim_readiness_readback.py tests/test_ao2_rsi_self_change_dry_run_readback.py tests/test_ao2_rsi_authority_packet_readback.py -q",
              "log": str(out / "pytest.log"),
          }
          (out / "summary.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          exit "$status"
      - name: Upload Python guard artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-python-guards
          path: target/ci-artifacts/python-guards
          if-no-files-found: error

  ao2-rsi-claim-readiness-readback:
    name: AO2 RSI claim-readiness readback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Use matching AO2 branch when present
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          head_ref="${HEAD_REF}"
          if git -C ao2 ls-remote --exit-code origin "refs/heads/${head_ref}" >/dev/null 2>&1; then
            git -C ao2 fetch --depth=1 origin "${head_ref}"
            git -C ao2 checkout --detach FETCH_HEAD
          fi
      - name: Generate AO2 RSI claim-readiness audit
        shell: bash
        working-directory: ao2
        run: |
          npm run rsi:claim-readiness
          test -f target/rsi-claim-readiness/latest/summary.json
      - name: Verify AO2 RSI claim-readiness readback
        shell: bash
        working-directory: ao2-control-plane
        run: |
          mkdir -p target/ao2-rsi-claim-readiness-readback
          scripts/verify_ao2_rsi_claim_readiness.py \
            --claim-summary-json ../ao2/target/rsi-claim-readiness/latest/summary.json \
            --out-json target/ao2-rsi-claim-readiness-readback/summary.json \
            | tee target/ao2-rsi-claim-readiness-readback/verify.log
          grep -q 'control_plane_ao2_rsi_claim_readiness_readback=passed' target/ao2-rsi-claim-readiness-readback/verify.log
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/ao2-rsi-claim-readiness-readback/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-ao2-rsi-claim-readiness-readback.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["claim_boundary"]["bounded_governed_rsi"] == "allowed", summary
          assert summary["claim_boundary"]["full_autonomous_self_mutating_rsi"] == "denied", summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_rsi_claims"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["mutates_github_repositories"] is False, summary
          assert trust_boundary["mutates_observer_storage"] is False, summary
          assert trust_boundary["provider_api_keys_allowed"] is False, summary
          PY
      - name: Upload AO2 RSI claim-readiness readback
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-ao2-rsi-claim-readiness-readback
          path: ao2-control-plane/target/ao2-rsi-claim-readiness-readback
          if-no-files-found: error

  ao2-rsi-self-change-dry-run-readback:
    name: AO2 RSI self-change dry-run readback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Use matching AO2 branch when present
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          head_ref="${HEAD_REF}"
          if git -C ao2 ls-remote --exit-code origin "refs/heads/${head_ref}" >/dev/null 2>&1; then
            git -C ao2 fetch --depth=1 origin "${head_ref}"
            git -C ao2 checkout --detach FETCH_HEAD
          fi
      - name: Generate AO2 RSI self-change dry-run
        shell: bash
        working-directory: ao2
        run: |
          npm run rsi:self-change-dry-run
          test -f target/rsi-self-change-dry-run/latest/summary.json
      - name: Verify AO2 RSI self-change dry-run readback
        shell: bash
        working-directory: ao2-control-plane
        run: |
          mkdir -p target/ao2-rsi-self-change-dry-run-readback
          scripts/verify_ao2_rsi_self_change_dry_run.py \
            --self-change-summary-json ../ao2/target/rsi-self-change-dry-run/latest/summary.json \
            --out-json target/ao2-rsi-self-change-dry-run-readback/summary.json \
            | tee target/ao2-rsi-self-change-dry-run-readback/verify.log
          grep -q 'control_plane_ao2_rsi_self_change_dry_run_readback=passed' target/ao2-rsi-self-change-dry-run-readback/verify.log
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/ao2-rsi-self-change-dry-run-readback/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-ao2-rsi-self-change-dry-run-readback.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["self_change"]["mode"] == "dry_run", summary
          assert summary["self_change"]["applies_patch"] is False, summary
          assert summary["rollback"]["rehearsal_status"] == "planned_not_executed", summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_rsi_claims"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["applies_ao_patches"] is False, summary
          assert trust_boundary["mutates_github_repositories"] is False, summary
          assert trust_boundary["mutates_observer_storage"] is False, summary
          assert trust_boundary["provider_api_keys_allowed"] is False, summary
          PY
      - name: Upload AO2 RSI self-change dry-run readback
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-ao2-rsi-self-change-dry-run-readback
          path: ao2-control-plane/target/ao2-rsi-self-change-dry-run-readback
          if-no-files-found: error

  ao2-rsi-authority-packet-readback:
    name: AO2 RSI authority packet readback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Use matching AO2 branch when present
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          head_ref="${HEAD_REF}"
          if git -C ao2 ls-remote --exit-code origin "refs/heads/${head_ref}" >/dev/null 2>&1; then
            git -C ao2 fetch --depth=1 origin "${head_ref}"
            git -C ao2 checkout --detach FETCH_HEAD
          fi
      - name: Generate AO2 RSI self-change dry-run
        shell: bash
        working-directory: ao2
        run: |
          npm run rsi:self-change-dry-run
          test -f target/rsi-self-change-dry-run/latest/summary.json
          test -f target/rsi-self-change-dry-run/latest/live-self-change-authority.packet.json
      - name: Verify AO2 RSI authority packet readback
        shell: bash
        working-directory: ao2-control-plane
        run: |
          mkdir -p target/ao2-rsi-authority-packet-readback
          scripts/verify_ao2_rsi_authority_packet.py \
            --self-change-summary-json ../ao2/target/rsi-self-change-dry-run/latest/summary.json \
            --out-json target/ao2-rsi-authority-packet-readback/summary.json \
            | tee target/ao2-rsi-authority-packet-readback/verify.log
          grep -q 'control_plane_ao2_rsi_authority_packet_readback=passed' target/ao2-rsi-authority-packet-readback/verify.log
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/ao2-rsi-authority-packet-readback/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-ao2-rsi-authority-packet-readback.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["authority_packet"]["mode"] == "dry_run_candidate", summary
          assert summary["authority_packet"]["schema_version"] == "covenant.live-self-change-authority.v1", summary
          assert summary["authority_packet"]["schema_valid_for_claim_publish"] is False, summary
          assert summary["authority_packet"]["claim_level"] == "full_autonomous_self_mutating_rsi", summary
          assert summary["authority_packet"]["live_self_change_status"] == "dry_run_not_live", summary
          assert summary["authority_packet"]["observer_readback_status"] == "missing", summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_rsi_claims"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["applies_ao_patches"] is False, summary
          assert trust_boundary["mutates_github_repositories"] is False, summary
          assert trust_boundary["mutates_observer_storage"] is False, summary
          assert trust_boundary["publishes_claims"] is False, summary
          assert trust_boundary["provider_api_keys_allowed"] is False, summary
          PY
      - name: Upload AO2 RSI authority packet readback
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-ao2-rsi-authority-packet-readback
          path: ao2-control-plane/target/ao2-rsi-authority-packet-readback
          if-no-files-found: error

  ao2-rsi-live-self-change-rehearsal-readback:
    name: AO2 RSI live self-change rehearsal readback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Use matching AO2 branch when present
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          head_ref="${HEAD_REF}"
          if git -C ao2 ls-remote --exit-code origin "refs/heads/${head_ref}" >/dev/null 2>&1; then
            git -C ao2 fetch --depth=1 origin "${head_ref}"
            git -C ao2 checkout --detach FETCH_HEAD
          fi
      - name: Generate AO2 RSI live self-change rehearsal
        shell: bash
        working-directory: ao2
        run: |
          AO2_RSI_LIVE_SELF_CHANGE_REHEARSAL=1 npm run rsi:live-self-change-rehearsal
          test -f target/rsi-live-self-change-rehearsal/latest/summary.json
      - name: Verify AO2 RSI live self-change rehearsal readback
        shell: bash
        working-directory: ao2-control-plane
        run: |
          mkdir -p target/ao2-rsi-live-self-change-rehearsal-readback
          scripts/verify_ao2_rsi_live_self_change_rehearsal.py \
            --live-rehearsal-summary-json ../ao2/target/rsi-live-self-change-rehearsal/latest/summary.json \
            --out-json target/ao2-rsi-live-self-change-rehearsal-readback/summary.json \
            | tee target/ao2-rsi-live-self-change-rehearsal-readback/verify.log
          grep -q 'control_plane_ao2_rsi_live_self_change_rehearsal_readback=passed' target/ao2-rsi-live-self-change-rehearsal-readback/verify.log
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/ao2-rsi-live-self-change-rehearsal-readback/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-ao2-rsi-live-self-change-rehearsal-readback.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["self_change"]["mode"] == "live_rehearsal", summary
          assert summary["self_change"]["repository_restored"] is True, summary
          assert summary["rollback"]["status"] == "passed", summary
          assert summary["observer_readback"]["status"] == "missing", summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_rsi_claims"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["applies_ao_patches"] is False, summary
          assert trust_boundary["mutates_github_repositories"] is False, summary
          assert trust_boundary["mutates_observer_storage"] is False, summary
          assert trust_boundary["publishes_claims"] is False, summary
          assert trust_boundary["provider_api_keys_allowed"] is False, summary
          PY
      - name: Upload AO2 RSI live self-change rehearsal readback
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-ao2-rsi-live-self-change-rehearsal-readback
          path: ao2-control-plane/target/ao2-rsi-live-self-change-rehearsal-readback
          if-no-files-found: error

  ao2-rsi-control-surface-readback:
    name: AO2 RSI control-surface readback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Checkout AO Covenant
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao-covenant
          path: ao-covenant
      - name: Use matching AO2 branch when present
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          head_ref="${HEAD_REF}"
          if git -C ao2 ls-remote --exit-code origin "refs/heads/${head_ref}" >/dev/null 2>&1; then
            git -C ao2 fetch --depth=1 origin "${head_ref}"
            git -C ao2 checkout --detach FETCH_HEAD
          fi
      - name: Generate AO2 RSI improvement control-surface evidence
        shell: bash
        working-directory: ao2
        run: |
          AO2_CONTROL_PLANE_REPO=../ao2-control-plane AO_COVENANT_REPO=../ao-covenant npm run rsi:cross-repo-e2e
          npm run rsi:improvement-evidence-gate
          npm run rsi:improvement-trend
          test -f target/rsi-improvement-evidence-gate/latest/summary.json
          test -f target/rsi-improvement-trend/latest/summary.json
      - name: Verify AO2 RSI control-surface readback
        shell: bash
        working-directory: ao2-control-plane
        run: |
          mkdir -p target/ao2-rsi-control-surface-readback
          scripts/verify_ao2_rsi_control_surface_readback.py \
            --gate-summary-json ../ao2/target/rsi-improvement-evidence-gate/latest/summary.json \
            --trend-summary-json ../ao2/target/rsi-improvement-trend/latest/summary.json \
            --out-json target/ao2-rsi-control-surface-readback/summary.json \
            | tee target/ao2-rsi-control-surface-readback/verify.log
          grep -q 'control_plane_ao2_rsi_control_surface_readback=passed' target/ao2-rsi-control-surface-readback/verify.log
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/ao2-rsi-control-surface-readback/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-ao2-rsi-control-surface-readback.v1", summary
          assert summary["status"] == "passed", summary
          surface = summary["control_surface_readback"]
          assert surface["loop_goal"] == "bounded_governed_rsi_control_surface_readback", summary
          assert surface["bounded_governed_rsi"]["status"] == "supported", summary
          assert surface["bounded_governed_rsi"]["evidence_state"] == "passing", summary
          assert surface["full_autonomous_self_mutating_rsi"]["status"] == "denied", summary
          assert surface["full_autonomous_self_mutating_rsi"]["publish_authority"] is False, summary
          assert surface["improvement_score"]["target_exceeded"] is True, summary
          assert surface["improvement_score"]["interpretation"] == "workflow_hardening_coverage_not_publication_authority", summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_rsi_claims"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["applies_ao_patches"] is False, summary
          assert trust_boundary["mutates_github_repositories"] is False, summary
          assert trust_boundary["mutates_observer_storage"] is False, summary
          assert trust_boundary["publishes_claims"] is False, summary
          assert trust_boundary["provider_api_keys_allowed"] is False, summary
          PY
      - name: Upload AO2 RSI control-surface readback
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-ao2-rsi-control-surface-readback
          path: ao2-control-plane/target/ao2-rsi-control-surface-readback
          if-no-files-found: error

  ao-stack-rsi-chain-binding-readback:
    name: AO stack RSI chain-binding readback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Checkout AO Covenant
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao-covenant
          path: ao-covenant
      - name: Checkout AO Blueprint
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao-blueprint
          path: ao-blueprint
      - name: Checkout AO Foundry
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao-foundry
          path: ao-foundry
      - name: Checkout AO Forge
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao-forge
          path: ao-forge
      - name: Setup Go for AO Covenant
        uses: actions/setup-go@v6
        with:
          go-version-file: ao-covenant/go.mod
      - name: Generate AO Blueprint authorization
        shell: bash
        working-directory: ao-blueprint
        run: |
          mkdir -p ../ao2-control-plane/target/ao-stack-rsi-chain-binding-readback/producers
          go run ./cmd/blueprint authorize \
            --pack examples/blueprints/valid/ao-blueprint-self \
            --out ../ao2-control-plane/target/ao-stack-rsi-chain-binding-readback/producers/blueprint-build-authorization.json
      - name: Generate AO2 RSI cross-repo evidence
        shell: bash
        working-directory: ao2
        run: |
          AO2_CONTROL_PLANE_REPO=../ao2-control-plane AO_COVENANT_REPO=../ao-covenant npm run rsi:cross-repo-e2e
          npm run rsi:improvement-evidence-gate
          npm run rsi:improvement-trend
          test -f target/rsi-cross-repo-e2e/latest/summary.json
          test -f target/rsi-improvement-evidence-gate/latest/summary.json
          test -f target/rsi-improvement-trend/latest/summary.json
      - name: Generate control-surface readback
        shell: bash
        working-directory: ao2-control-plane
        run: |
