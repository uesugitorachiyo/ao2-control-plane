name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: Cargo deny (bans + licenses + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      # Checks dependency bans (duplicate versions), license allow-list, and
      # source allow-list against the checked-in deny.toml. Advisory scanning
      # remains in the dedicated `audit` job (cargo-audit).
      - name: Deny check
        run: cargo deny check bans licenses sources

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # RUSTSEC-2023-0071 (rsa 0.9.x Marvin Attack) ignored: we use rsa only
      # for signature *verification* (public-key modexp via the `Verifier`
      # trait). The Marvin Attack targets RSA *decryption* timing
      # sidechannels; verify-only paths are not exposed. See
      # docs/security/advisory-dispositions.md for the full disposition.
      - name: Audit dependencies
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  python-guards:
    name: Python guard tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install pytest
        run: python3 -m pip install pytest
      - name: Run Python guard tests
        shell: bash
        run: |
          mkdir -p target/ci-artifacts/python-guards
          set +e
          PYTHONDONTWRITEBYTECODE=1 python3 -m pytest tests/test_start_long_lived_dev.py tests/test_release_asset_parity_audit.py -q \
            2>&1 | tee target/ci-artifacts/python-guards/pytest.log
          status="${PIPESTATUS[0]}"
          set -e
          python3 - "$status" <<'PY'
          import json
          import sys
          from pathlib import Path

          status = int(sys.argv[1])
          out = Path("target/ci-artifacts/python-guards")
          payload = {
              "schema_version": "ao2.cp-python-guard-ci-artifacts.v1",
              "status": "passed" if status == 0 else "failed",
              "command": "PYTHONDONTWRITEBYTECODE=1 python3 -m pytest tests/test_start_long_lived_dev.py tests/test_release_asset_parity_audit.py -q",
              "log": str(out / "pytest.log"),
          }
          (out / "summary.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          exit "$status"
      - name: Upload Python guard artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-python-guards
          path: target/ci-artifacts/python-guards
          if-no-files-found: error

  release-support-fixture-parity:
    name: Release support fixture parity with AO2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao2-control-plane
        uses: actions/checkout@v6.0.3
        with:
          path: ao2-control-plane
      - name: Checkout AO2
        uses: actions/checkout@v6.0.3
        with:
          repository: uesugitorachiyo/ao2
          path: ao2
      - name: Use matching AO2 branch when present
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          head_ref="${{ github.head_ref }}"
          if git -C ao2 ls-remote --exit-code origin "refs/heads/${head_ref}" >/dev/null 2>&1; then
            git -C ao2 fetch --depth=1 origin "${head_ref}"
            git -C ao2 checkout --detach FETCH_HEAD
          fi
      - name: Compare shared release support fixture
        shell: bash
        run: |
          mkdir -p ao2-control-plane/target/release-support-fixture-parity
          cmp -s ao2-control-plane/tests/fixtures/release-support-bundle-contract-v1.json ao2/tests/fixtures/release-support-bundle-contract-v1.json
          shasum -a 256 ao2-control-plane/tests/fixtures/release-support-bundle-contract-v1.json ao2/tests/fixtures/release-support-bundle-contract-v1.json \
            | tee ao2-control-plane/target/release-support-fixture-parity/SHA256SUMS
          python3 - <<'PY'
          import json
          from pathlib import Path

          out = Path("ao2-control-plane/target/release-support-fixture-parity")
          summary = {
              "schema_version": "ao2.cp-release-support-fixture-parity.v1",
              "status": "passed",
              "producer_repo": "ao2",
              "consumer_repo": "ao2-control-plane",
              "fixture": "tests/fixtures/release-support-bundle-contract-v1.json",
              "byte_identical": True,
              "sha256s": str(out / "SHA256SUMS"),
          }
          (out / "summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          test -f ao2-control-plane/target/release-support-fixture-parity/summary.json
      - name: Upload release support fixture parity
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-support-fixture-parity
          path: ao2-control-plane/target/release-support-fixture-parity
          if-no-files-found: error

  release-publication-closure:
    name: Release publication closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Verify published release downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p target/release-publication-closure
          AO2_CP_RELEASE_CLOSURE_SUMMARY_JSON=target/release-publication-closure/summary.json \
            scripts/release-download-verify.sh
          test -f target/release-publication-closure/summary.json
      - name: Upload release publication closure artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-publication-closure
          path: target/release-publication-closure
          if-no-files-found: error

  release-asset-parity-audit:
    name: Release asset parity audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Audit stable release asset parity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p target/release-asset-parity-audit
          AO2_CP_RELEASE_ASSET_PARITY_SUMMARY_JSON=target/release-asset-parity-audit/summary.json \
            scripts/release-asset-parity-audit.sh
          test -f target/release-asset-parity-audit/summary.json
      - name: Validate release asset parity summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/release-asset-parity-audit/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-release-asset-parity-audit.v1", summary
          assert summary["release_repo"] == "uesugitorachiyo/ao2-control-plane", summary
          assert summary["release_tag"] == "v0.1.12", summary
          assert summary["status"] in {"passed", "attention"}, summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_release"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["mutates_github_releases"] is False, summary
          assert trust_boundary["credential_material_included"] is False, summary
          PY
      - name: Upload release asset parity audit artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-asset-parity-audit
          path: target/release-asset-parity-audit
          if-no-files-found: error

  operator-release-evidence-bridge-contract:
    name: Operator release evidence bridge contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Verify operator release evidence bridge contract
        run: scripts/operator-release-evidence-bridge-contract.sh

  dr-restore-drill:
    name: Backup/restore drill
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Run backup/restore drill
        shell: bash
        run: |
          scripts/cp-dr-restore-drill.sh \
            --work-dir target/dr-restore-drill/ci \
            --out target/dr-restore-drill/ci/dr-restore-report.json
      - name: Upload backup/restore drill artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-dr-restore
          path: target/dr-restore-drill/ci
          if-no-files-found: error

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Fast-fail on style/lint before spending the 3-OS test matrix.
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Two release_publication tests spawn 500-concurrent HTTP bursts that
      # exhaust the default file-descriptor soft limit on Linux (1024) and macOS
      # (256). Raising the soft limit to 65536 stays well under both runner
      # hard caps and does not need sudo. See README "Running tests" section.
      - name: Test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ulimit -n 65536 && cargo test --workspace
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: cargo test --workspace

  risky-pr-golden-bridge-smoke:
    name: Risky PR golden bridge smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: macos-aarch64
            os: macos-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
            server_bin: target/release/ao2-cp-server.exe
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Run Unix bridge smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          python3 scripts/smoke-risky-pr-golden-bridge.py \
            --manifest tests/fixtures/risky-pr-golden-artifact-manifest.json \
            --server-bin "${{ matrix.server_bin }}" \
            --out-root "target/risky-pr-golden-bridge-smoke/${{ matrix.name }}"
      - name: Run Windows bridge smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          python scripts/smoke-risky-pr-golden-bridge.py `
            --manifest tests/fixtures/risky-pr-golden-artifact-manifest.json `
            --server-bin "${{ matrix.server_bin }}" `
            --out-root "target/risky-pr-golden-bridge-smoke/${{ matrix.name }}"
      - name: Upload bridge smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-risky-pr-golden-bridge-${{ matrix.name }}
          path: target/risky-pr-golden-bridge-smoke/${{ matrix.name }}
          if-no-files-found: error

  release-train-bridge-smoke:
    name: Release train bridge smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: macos-aarch64
            os: macos-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
            server_bin: target/release/ao2-cp-server.exe
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Run Unix release train bridge smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          python3 scripts/smoke-release-train-bridge.py \
            --summary tests/fixtures/public-release-train-summary.json \
            --server-bin "${{ matrix.server_bin }}" \
            --out-root "target/release-train-bridge-smoke/${{ matrix.name }}"
      - name: Run Windows release train bridge smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          python scripts/smoke-release-train-bridge.py `
            --summary tests/fixtures/public-release-train-summary.json `
            --server-bin "${{ matrix.server_bin }}" `
            --out-root "target/release-train-bridge-smoke/${{ matrix.name }}"
      - name: Upload release train bridge smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-train-bridge-${{ matrix.name }}
          path: target/release-train-bridge-smoke/${{ matrix.name }}
          if-no-files-found: error

  operator-release-evidence-bridge-smoke:
    name: Operator release evidence bridge smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: macos-aarch64
            os: macos-latest
            shell: bash
            server_bin: target/release/ao2-cp-server
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
            server_bin: target/release/ao2-cp-server.exe
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Run Unix operator release evidence bridge smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          python3 scripts/smoke-operator-release-evidence-bridge.py \
            --summary crates/ao2-cp-server/tests/fixtures/operator-release-evidence-bundle-summary.json \
            --server-bin "${{ matrix.server_bin }}" \
            --out-root "target/operator-release-evidence-bridge-smoke/${{ matrix.name }}"
      - name: Run Windows operator release evidence bridge smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          python scripts/smoke-operator-release-evidence-bridge.py `
            --summary crates/ao2-cp-server/tests/fixtures/operator-release-evidence-bundle-summary.json `
            --server-bin "${{ matrix.server_bin }}" `
            --out-root "target/operator-release-evidence-bridge-smoke/${{ matrix.name }}"
      - name: Upload operator release evidence bridge smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-operator-release-evidence-bridge-smoke-${{ matrix.name }}
          path: target/operator-release-evidence-bridge-smoke/${{ matrix.name }}
          if-no-files-found: error

  ingest-smoke:
    name: Ingest smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            shell: bash
          - name: macos-aarch64
            os: macos-latest
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Unix ingest smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: scripts/smoke-ingest-from-ao2.sh
      - name: Run Windows ingest smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: ./scripts/smoke-ingest-from-ao2.ps1

  smoke:
    name: Release archive smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: ingest-smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            target_label: linux-x86_64
            binary: target/release/ao2-cp-server
            archive: dist/ao2-control-plane-0.1.12-linux-x86_64.tar.gz
            shell: bash
          - name: macos-aarch64
            os: macos-latest
            target_label: macos-aarch64
            binary: target/release/ao2-cp-server
            archive: dist/ao2-control-plane-0.1.12-macos-aarch64.tar.gz
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            target_label: windows-x86_64
            binary: target/release/ao2-cp-server.exe
            archive: dist/ao2-control-plane-0.1.12-windows-x86_64.tar.gz
            shell: pwsh
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Package archive
        shell: bash
        run: |
          scripts/package-local.sh \
            --out-dir dist \
            --version 0.1.12 \
            --binary "${{ matrix.binary }}" \
            --target-label "${{ matrix.target_label }}"
      - name: Run Unix archive smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          AO2_CP_ARCHIVE="${{ matrix.archive }}" \
            AO2_CP_SMOKE_JSON="target/release-smoke/${{ matrix.target_label }}.json" \
            scripts/smoke-release-archive.sh
      - name: Run Windows archive smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $env:AO2_CP_ARCHIVE = "${{ matrix.archive }}"
          $env:AO2_CP_SMOKE_JSON = "target/release-smoke/${{ matrix.target_label }}.json"
          ./scripts/smoke-release-archive.ps1
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-smoke-${{ matrix.target_label }}
          path: target/release-smoke/${{ matrix.target_label }}.json
      - name: Upload release archive artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-archive-${{ matrix.target_label }}
          path: |
            ${{ matrix.archive }}
            dist/SHA256SUMS
            target/release-smoke/${{ matrix.target_label }}.json
          if-no-files-found: error
