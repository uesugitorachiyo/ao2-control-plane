name: production-readiness-ops

on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"

permissions:
  contents: read

jobs:
  branch-protection:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Verify branch protection
        shell: bash
        run: scripts/verify-branch-protection.sh
