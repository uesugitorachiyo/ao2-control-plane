name: Release Promotion

on:
  workflow_dispatch:
    inputs:
      version:
        description: ao2-control-plane package version to promote.
        required: true
      tag:
        description: GitHub release tag to prepare or publish.
        required: true
      source_sha:
        description: Exact 40-character source commit to prepare or publish.
        required: true
      dry_run:
        description: Prepare release evidence only; set false to publish.
        required: true
        default: true
      promotion_plan_run_id:
        description: Successful dry-run workflow run ID (required only for live publication).
        required: false
      promotion_plan_sha256:
        description: Exact SHA-256 of the dry-run summary.json (required only for live publication).
        required: false
      publish_confirmation:
        description: Exact live confirmation shown in the promotion plan instructions.
        required: false

permissions:
  actions: read
  contents: read

concurrency:
  group: ao2-control-plane-release-promotion-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate-dispatch:
    name: Validate bounded dispatch contract
    runs-on: ubuntu-latest
    steps:
      - name: Validate bounded dispatch contract
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.dry_run }}
          PROMOTION_PLAN_RUN_ID: ${{ inputs.promotion_plan_run_id }}
          PROMOTION_PLAN_SHA256: ${{ inputs.promotion_plan_sha256 }}
          PUBLISH_CONFIRMATION: ${{ inputs.publish_confirmation }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          import re

          source_sha = os.environ["SOURCE_SHA"]
          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          dry_run = os.environ["DRY_RUN"]
          promotion_plan_run_id = os.environ["PROMOTION_PLAN_RUN_ID"]
          promotion_plan_sha256 = os.environ["PROMOTION_PLAN_SHA256"]
          confirmation = os.environ["PUBLISH_CONFIRMATION"]
          event_sha = os.environ["EVENT_SHA"]

          if not re.fullmatch(r"[0-9a-f]{40}", source_sha):
              raise SystemExit("source_sha must be exactly 40 lowercase hexadecimal characters")
          if source_sha != event_sha:
              raise SystemExit("source_sha != event_sha")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
              raise SystemExit("version must be a three-part numeric semantic version")
          if tag != f"v{version}":
              raise SystemExit("tag must exactly match v<version>")
          if dry_run not in {"true", "false"}:
              raise SystemExit("dry_run must be true or false")

          live_values = (promotion_plan_run_id, promotion_plan_sha256, confirmation)
          if dry_run == "true":
              if any(live_values):
                  raise SystemExit("dry-run dispatch must not include live publication inputs")
          else:
              if not re.fullmatch(r"[1-9][0-9]*", promotion_plan_run_id):
                  raise SystemExit("promotion_plan_run_id must be a positive integer")
              if not re.fullmatch(r"[0-9a-f]{64}", promotion_plan_sha256):
                  raise SystemExit("promotion_plan_sha256 must be exactly 64 lowercase hexadecimal characters")
              expected = (
                  f"publish {tag} from {source_sha} with plan {promotion_plan_sha256}"
              )
              if confirmation != expected:
                  raise SystemExit("exact publication confirmation mismatch")
          print("release_promotion_dispatch_validation=passed")
          PY

  post-release-verification-baseline:
    name: Require successful post-release verification baseline
    runs-on: ubuntu-latest
    needs: validate-dispatch
    if: ${{ inputs.dry_run != 'false' }}
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Verify exact workflow source SHA
        shell: bash
        run: |
          set -euo pipefail
          source_sha="${{ inputs.source_sha }}"
          if ! printf '%s' "$source_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "source_sha must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
          if [ "$source_sha" != "${{ github.sha }}" ]; then
            echo "source_sha does not match workflow source: requested=$source_sha workflow=${{ github.sha }}" >&2
            exit 1
          fi
      - name: Verify latest main post-release verification evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/verify_post_release_baseline.py \
            --repo uesugitorachiyo/ao2-control-plane \
            --branch main \
            --workflow "Post Release Verification" \
            --head-sha "${{ inputs.source_sha }}" \
            --out-json target/release-promotion/${{ inputs.tag }}/post-release-baseline.json
      - name: Validate post-release baseline summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(Path("target/release-promotion/${{ inputs.tag }}/post-release-baseline.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-post-release-verification-baseline.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["repo"] == "uesugitorachiyo/ao2-control-plane", summary
          assert summary["branch"] == "main", summary
          assert summary["workflow"] == "Post Release Verification", summary
          required = [artifact["name"] for artifact in summary["required_artifacts"]]
          assert required == [
              "ao2-control-plane-post-release-verification-ubuntu",
              "ao2-control-plane-post-release-verification-macos",
              "ao2-control-plane-post-release-verification-windows",
              "ao2-control-plane-post-release-pair-verification",
              "ao2-control-plane-post-release-operator-evidence-hosted-bridge-smoke",
              "ao2-control-plane-post-release-active-stack-release-handoff-readback",
          ], summary
          assert not summary["missing_artifacts"], summary
          assert not summary["expired_artifacts"], summary
          trust = summary["trust_boundary"]
          assert trust["control_plane_approves_release"] is False, summary
          assert trust["mutates_ao_artifacts"] is False, summary
          assert trust["mutates_github_releases"] is False, summary
          assert trust["credential_material_included"] is False, summary
          PY
      - name: Upload post-release baseline preflight
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-promotion-post-release-baseline-${{ inputs.tag }}
          path: target/release-promotion/${{ inputs.tag }}/post-release-baseline.json
          if-no-files-found: error

  build-release-archives:
    name: Build release archive (${{ matrix.target_label }})
    runs-on: ${{ matrix.os }}
    needs: post-release-verification-baseline
    if: ${{ inputs.dry_run != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x86_64
            os: ubuntu-latest
            target_label: linux-x86_64
            binary: target/release/ao2-cp-server
            archive: dist/ao2-control-plane-${{ inputs.version }}-linux-x86_64.tar.gz
            shell: bash
          - name: macos-aarch64
            os: macos-latest
            target_label: macos-aarch64
            binary: target/release/ao2-cp-server
            archive: dist/ao2-control-plane-${{ inputs.version }}-macos-aarch64.tar.gz
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            target_label: windows-x86_64
            binary: target/release/ao2-cp-server.exe
            archive: dist/ao2-control-plane-${{ inputs.version }}-windows-x86_64.tar.gz
            shell: pwsh
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify requested version matches workspace metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          input_version = "${{ inputs.version }}"
          workspace_version = ""
          in_workspace_package = False
          for line in Path("Cargo.toml").read_text(encoding="utf-8").splitlines():
              stripped = line.strip()
              if stripped == "[workspace.package]":
                  in_workspace_package = True
                  continue
              if in_workspace_package and stripped.startswith("["):
                  break
              if in_workspace_package and stripped.startswith("version = "):
                  workspace_version = stripped.split('"', 2)[1]
                  break
          if not workspace_version:
              raise SystemExit("release promotion version mismatch: missing Cargo.toml workspace_version")
          if input_version != workspace_version:
              raise SystemExit(
                  f"release promotion version mismatch: input_version={input_version} workspace_version={workspace_version}"
              )
          print(f"release_promotion_workspace_version={workspace_version}")
          PY
      - name: Build release binary
        run: cargo build --release -p ao2-cp-server
      - name: Package archive
        shell: bash
        run: |
          rm -rf dist
          scripts/package-local.sh \
            --out-dir dist \
            --version "${{ inputs.version }}" \
            --binary "${{ matrix.binary }}" \
            --target-label "${{ matrix.target_label }}"
      - name: Check release archive license files
        shell: bash
        run: scripts/check-license-policy.sh --scan-archives
      - name: Run Unix archive smoke
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          AO2_CP_ARCHIVE="${{ matrix.archive }}" \
            AO2_CP_SMOKE_JSON="target/release-smoke/${{ matrix.target_label }}.json" \
            scripts/smoke-release-archive.sh
      - name: Run Windows archive smoke
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $env:AO2_CP_ARCHIVE = "${{ matrix.archive }}"
          $env:AO2_CP_SMOKE_JSON = "target/release-smoke/${{ matrix.target_label }}.json"
          ./scripts/smoke-release-archive.ps1
      - name: Upload release candidate artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-candidate-${{ inputs.tag }}-${{ matrix.target_label }}
          path: |
            ${{ matrix.archive }}
            dist/SHA256SUMS
            target/release-smoke/${{ matrix.target_label }}.json
          if-no-files-found: error

  assemble-release-promotion-plan:
    name: Assemble release promotion plan
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run != 'false' }}
    needs:
      - post-release-verification-baseline
      - build-release-archives
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Download post-release baseline preflight
        uses: actions/download-artifact@v8.0.1
        with:
          name: ao2-control-plane-release-promotion-post-release-baseline-${{ inputs.tag }}
          path: target/release-promotion/${{ inputs.tag }}
      - name: Download release candidate artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ao2-control-plane-release-candidate-${{ inputs.tag }}-*
          path: target/release-promotion/${{ inputs.tag }}/downloaded
      - name: Assemble promotion evidence
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          version = "${{ inputs.version }}"
          tag = "${{ inputs.tag }}"
          dry_run = "${{ inputs.dry_run }}" != "false"
          root = Path("target/release-promotion") / tag
          downloaded = root / "downloaded"
          root.mkdir(parents=True, exist_ok=True)
          post_release_baseline = json.loads((root / "post-release-baseline.json").read_text(encoding="utf-8"))
          required_post_release_artifacts = [
              artifact["name"] for artifact in post_release_baseline["required_artifacts"]
          ]
          expected_targets = ["linux-x86_64", "macos-aarch64", "windows-x86_64"]
          archive_assets = []
          checksum_lines = []
          gaps = []

          for target_label in expected_targets:
              name = f"ao2-control-plane-{version}-{target_label}.tar.gz"
              matches = list(downloaded.glob(f"**/{name}"))
              if len(matches) != 1:
                  gaps.append(
                      {
                          "gap_kind": "missing_or_ambiguous_archive",
                          "target_label": target_label,
                          "asset": name,
                          "matches": [str(path) for path in matches],
                      }
                  )
                  continue
              path = matches[0]
              data = path.read_bytes()
              sha256 = hashlib.sha256(data).hexdigest()
              relative = path.relative_to(root)
              archive_assets.append(
                  {
                      "name": name,
                      "path": str(relative),
                      "sha256": sha256,
                      "size_bytes": len(data),
                      "target_label": target_label,
                  }
              )
              checksum_lines.append(f"{sha256}  {name}\n")

          if gaps:
              (root / "summary.json").write_text(
                  json.dumps(
                      {
                          "schema_version": "ao2.cp-release-promotion-plan.v1",
                          "status": "blocked",
                          "version": version,
                          "tag": tag,
                          "gaps": gaps,
                      },
                      indent=2,
                      sort_keys=True,
                  )
                  + "\n",
                  encoding="utf-8",
              )
              raise SystemExit("release promotion plan blocked by archive gaps")

          checksum_manifest = root / "SHA256SUMS"
          release_notes = root / "release-notes.md"
          evidence_assets = [
              {
                  "name": "summary.json",
                  "path": "summary.json",
                  "asset_kind": "release_promotion_summary",
                  "checksum_manifest_entry": True,
              },
              {
                  "name": "post-release-baseline.json",
                  "path": "post-release-baseline.json",
                  "asset_kind": "post_release_verification_baseline",
                  "checksum_manifest_entry": True,
              },
              {
                  "name": "release-notes.md",
                  "path": "release-notes.md",
                  "asset_kind": "release_notes",
                  "checksum_manifest_entry": True,
              }
          ]

          checksum_manifest.write_text("".join(checksum_lines), encoding="utf-8")
          subprocess.run(
              [
                  sys.executable,
                  "scripts/generate_release_notes_from_checksums.py",
                  "--version",
                  version,
                  "--tag",
                  tag,
                  "--checksums",
                  str(checksum_manifest),
                  "--output",
                  str(release_notes),
                  "--release-workflow",
                  "Release Promotion",
                  "--source-commit",
                  os.environ["GITHUB_SHA"],
              ],
              check=True,
          )
          release_notes_sha256 = hashlib.sha256(release_notes.read_bytes()).hexdigest()

          summary = {
              "schema_version": "ao2.cp-release-promotion-plan.v1",
              "status": "prepared",
              "version": version,
              "tag": tag,
              "dry_run": dry_run,
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "source_commit": os.environ["GITHUB_SHA"],
              "source_ref": os.environ["GITHUB_REF_NAME"],
              "archive_assets": archive_assets,
              "evidence_assets": evidence_assets,
              "post_release_verification_baseline": post_release_baseline,
              "required_post_release_artifacts": required_post_release_artifacts,
              "checksum_manifest": str(checksum_manifest),
              "release_notes": str(release_notes),
              "release_notes_sha256": release_notes_sha256,
              "trust_boundary": {
                  "control_plane_approves_release": False,
                  "mutates_ao_artifacts": False,
                  "mutates_github_releases": dry_run is False,
                  "github_release_mutation_requested": dry_run is False,
                  "credential_material_included": False,
                  "release_acceptance_owner": "factory-v3 evaluator-closer",
              },
          }
          summary_path = root / "summary.json"
          summary_bytes = (json.dumps(summary, indent=2, sort_keys=True) + "\n").encode("utf-8")
          summary_path.write_bytes(summary_bytes)
          summary_sha256 = hashlib.sha256(summary_bytes).hexdigest()
          print(f"promotion_plan_sha256={summary_sha256}")
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as step_summary:
              step_summary.write(f"Promotion plan SHA-256: `{summary_sha256}`\n")
              step_summary.write(
                  "Live confirmation: "
                  f"`publish {tag} from {os.environ['GITHUB_SHA']} with plan {summary_sha256}`\n"
              )
          checksum_lines.append(f"{summary_sha256}  summary.json\n")
          baseline_sha256 = hashlib.sha256((root / "post-release-baseline.json").read_bytes()).hexdigest()
          checksum_lines.append(f"{baseline_sha256}  post-release-baseline.json\n")
          checksum_lines.append(f"{release_notes_sha256}  release-notes.md\n")
          checksum_manifest.write_text("".join(checksum_lines), encoding="utf-8")
          PY
      - name: Upload release promotion plan
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-release-promotion-plan-${{ inputs.tag }}
          path: |
            target/release-promotion/${{ inputs.tag }}/summary.json
            target/release-promotion/${{ inputs.tag }}/post-release-baseline.json
            target/release-promotion/${{ inputs.tag }}/SHA256SUMS
            target/release-promotion/${{ inputs.tag }}/release-notes.md
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: validate-dispatch
    if: ${{ inputs.dry_run == 'false' }}
    environment: ao2-control-plane-release
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.source_sha }}
      - name: Verify protected release environment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/environments/ao2-control-plane-release" \
            > /tmp/release-environment.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          environment = json.loads(
              Path("/tmp/release-environment.json").read_text(encoding="utf-8")
          )
          if environment.get("name") != "ao2-control-plane-release":
              raise SystemExit("release environment identity mismatch")
          rules = environment.get("protection_rules")
          reviewer_rules = [
              rule for rule in rules or []
              if rule.get("type") == "required_reviewers"
          ]
          if not reviewer_rules or not reviewer_rules[0].get("reviewers"):
              raise SystemExit("release environment requires at least one reviewer")
          reviewer_rule = reviewer_rules[0]
          if reviewer_rule.get("prevent_self_review") is not True:
              owner = os.environ["GITHUB_REPOSITORY"].split("/", 1)[0]
              reviewer_logins = {
                  reviewer.get("reviewer", {}).get("login")
                  for reviewer in reviewer_rule["reviewers"]
              }
              if (
                  reviewer_rule.get("prevent_self_review") is not False
                  or reviewer_logins != {owner}
              ):
                  raise SystemExit(
                      "self-review may be enabled only for the sole repository-owner reviewer"
                  )
              print("release_environment_review_mode=single_owner_explicit")
          branch_policy = environment.get("deployment_branch_policy") or {}
          if branch_policy.get("protected_branches") is not True:
              raise SystemExit("release environment must require protected branches")
          print("release_environment_protection=passed")
          PY
      - name: Verify dry-run workflow provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="${{ inputs.promotion_plan_run_id }}"
          if ! printf '%s' "$run_id" | grep -Eq '^[1-9][0-9]*$'; then
            echo "promotion_plan_run_id must be a positive integer" >&2
            exit 1
          fi
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" > /tmp/promotion-run.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run = json.loads(Path("/tmp/promotion-run.json").read_text(encoding="utf-8"))
          expected = {
              "conclusion": "success",
              "event": "workflow_dispatch",
              "head_sha": "${{ inputs.source_sha }}",
              "path": ".github/workflows/release-promotion.yml",
          }
          for field, value in expected.items():
              if run.get(field) != value:
                  raise SystemExit(
                      f"promotion-plan run provenance mismatch: {field}={run.get(field)!r} expected={value!r}"
                  )
          if str(run.get("id")) != "${{ inputs.promotion_plan_run_id }}":
              raise SystemExit("promotion-plan run ID mismatch")
          PY
      - name: Download release candidate artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ao2-control-plane-release-candidate-${{ inputs.tag }}-*
          path: target/release-promotion/${{ inputs.tag }}/downloaded
          run-id: ${{ inputs.promotion_plan_run_id }}
          github-token: ${{ github.token }}
      - name: Download release promotion plan
        uses: actions/download-artifact@v8.0.1
        with:
          name: ao2-control-plane-release-promotion-plan-${{ inputs.tag }}
          path: target/release-promotion/${{ inputs.tag }}
          run-id: ${{ inputs.promotion_plan_run_id }}
          github-token: ${{ github.token }}
      - name: Validate exact immutable promotion plan
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_release_promotion.py \
            --root "target/release-promotion/${{ inputs.tag }}" \
            --source-sha "${{ inputs.source_sha }}" \
            --version "${{ inputs.version }}" \
            --tag "${{ inputs.tag }}" \
            --plan-sha256 "${{ inputs.promotion_plan_sha256 }}" \
            --confirmation "${{ inputs.publish_confirmation }}" \
            --event-sha "${{ github.sha }}"
      - name: Reject existing tag or release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          check_absent() {
            kind="$1"
            endpoint="$2"
            response=$(mktemp)
            set +e
            gh api --include "$endpoint" > "$response" 2>&1
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              echo "$kind already exists: $tag" >&2
              exit 1
            fi
            if ! grep -Eq '^HTTP/[0-9.]+ 404' "$response"; then
              echo "unable to prove $kind absence for $tag" >&2
              sed -n '1,8p' "$response" >&2
              exit 1
            fi
          }
          check_absent "tag" "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag"
          check_absent "release" "repos/$GITHUB_REPOSITORY/releases/tags/$tag"
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root="target/release-promotion/${{ inputs.tag }}"
          mapfile -t archives < <(find "$root/downloaded" -type f -name 'ao2-control-plane-*.tar.gz' -print | LC_ALL=C sort)
          if [ "${#archives[@]}" -ne 3 ]; then
            echo "validated archive closure changed before publication" >&2
            exit 1
          fi
          gh release create "${{ inputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ao2-control-plane ${{ inputs.tag }}" \
            --notes-file "$root/release-notes.md" \
            --target "${{ inputs.source_sha }}" \
            --latest \
            "${archives[@]}" \
            "$root/SHA256SUMS" \
            "$root/summary.json" \
            "$root/post-release-baseline.json" \
            "$root/release-notes.md"
