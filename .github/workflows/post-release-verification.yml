name: Post Release Verification

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "ao2-control-plane release tag to verify."
        required: false
        type: string
        default: v0.1.13
  schedule:
    - cron: "29 12 * * 2"

permissions:
  actions: read
  contents: read

concurrency:
  group: post-release-verification-${{ github.ref }}
  cancel-in-progress: false

env:
  AO2_CP_RELEASE_REPO: uesugitorachiyo/ao2-control-plane
  AO2_CP_RELEASE_TAG: ${{ inputs.release_tag || 'v0.1.13' }}

jobs:
  post-release-verification:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            label: Ubuntu post release verification
            os: ubuntu-latest
          - name: macos
            label: macOS post release verification
            os: macos-latest
          - name: windows
            label: Windows post release verification
            os: windows-latest

    steps:
      - name: Checkout release verifier
        uses: actions/checkout@v6.0.3

      - name: Verify public release downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AO2_CP_RELEASE_CLOSURE_SUMMARY_JSON=target/post-release-verification/${{ matrix.name }}/summary.json \
            scripts/release-download-verify.sh
          test -f "target/post-release-verification/${{ matrix.name }}/summary.json"

      - name: Validate post release verification summary
        shell: bash
        env:
          EXPECTED_AO2_CP_RELEASE_TAG: ${{ inputs.release_tag || 'v0.1.13' }}
        run: |
          if command -v python3 >/dev/null 2>&1; then
            python_bin="python3"
          elif command -v python >/dev/null 2>&1; then
            python_bin="python"
          else
            echo "missing Python interpreter: python3 or python required" >&2
            exit 1
          fi
          "$python_bin" - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("target/post-release-verification/${{ matrix.name }}/summary.json")
          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-release-publication-closure.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["release_repo"] == "uesugitorachiyo/ao2-control-plane", summary
          assert summary["release_tag"] == os.environ["EXPECTED_AO2_CP_RELEASE_TAG"], summary
          assert summary["checksum_verified"] is True, summary
          assert summary["assets"], summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_release"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["mutates_github_releases"] is False, summary
          assert trust_boundary["credential_material_included"] is False, summary
          PY

      - name: Upload post release verification evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-post-release-verification-${{ matrix.name }}
          path: target/post-release-verification/${{ matrix.name }}
          if-no-files-found: error

  public-release-pair-verification:
    name: AO2/control-plane public release pair verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release verifier
        uses: actions/checkout@v6.0.3

      - name: Verify public release pair
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p target/post-release-pair-verification
          scripts/public_release_pair_verify.py \
            --summary-json target/post-release-pair-verification/summary.json \
            --strict \
            | tee target/post-release-pair-verification/verify.log
          grep -q 'control_plane_public_release_pair_verification=passed' target/post-release-pair-verification/verify.log
          test -f target/post-release-pair-verification/summary.json

      - name: Validate public release pair summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/post-release-pair-verification/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-public-release-pair-verification.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["strict"] is True, summary
          assert summary["ao2"]["release_repo"] == "uesugitorachiyo/ao2", summary
          assert summary["control_plane"]["release_repo"] == "uesugitorachiyo/ao2-control-plane", summary
          assert summary["common_platforms"] == ["linux-x86_64", "macos-aarch64", "windows-x86_64"], summary
          trust_boundary = summary["trust_boundary"]
          assert trust_boundary["control_plane_approves_release"] is False, summary
          assert trust_boundary["downloads_archives"] is False, summary
          assert trust_boundary["mutates_ao_artifacts"] is False, summary
          assert trust_boundary["mutates_github_releases"] is False, summary
          assert trust_boundary["credential_material_included"] is False, summary
          PY

      - name: Upload public release pair verification evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-post-release-pair-verification
          path: target/post-release-pair-verification
          if-no-files-found: error

  operator-release-evidence-hosted-bridge-smoke:
    name: AO2 operator evidence hosted bridge drift monitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release verifier
        uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p ao2-cp-server

      - name: Run hosted AO2 operator release evidence bridge smoke
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/smoke-operator-release-evidence-bridge.py \
            --download-latest-ao2-artifact \
            --server-bin target/release/ao2-cp-server \
            --out-root target/post-release-operator-evidence-hosted-bridge-smoke

      - name: Validate hosted bridge smoke summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("target/post-release-operator-evidence-hosted-bridge-smoke/summary.json").read_text(encoding="utf-8"))
          assert summary["schema_version"] == "ao2.cp-operator-release-evidence-bridge-smoke.v1", summary
          assert summary["status"] == "passed", summary
          assert summary["downloaded_latest_ao2_artifact"] is True, summary
          operator = summary["operator_release_evidence"]
          assert operator["schema_version"] == "ao2.operator-release-evidence-bundle.v1", summary
          assert operator["status"] == "passed", summary
          assert operator["operator_release_evidence_ready"] is True, summary
          assert operator["path_redacted"] is True, summary
          trust = summary["trust_boundary"]
          assert trust["downloads_github_actions_artifacts"] is True, summary
          assert trust["control_plane_approves_release"] is False, summary
          assert trust["mutates_ao_artifacts"] is False, summary
          assert trust["mutates_observer_storage"] is False, summary
          assert trust["credential_material_included"] is False, summary
          assert trust["provider_api_keys_allowed"] is False, summary
          failed = [check for check in summary["checks"] if check["status"] != "passed"]
          assert not failed, failed
          PY

      - name: Upload hosted operator release evidence bridge smoke artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ao2-control-plane-post-release-operator-evidence-hosted-bridge-smoke
          path: target/post-release-operator-evidence-hosted-bridge-smoke
          if-no-files-found: error
